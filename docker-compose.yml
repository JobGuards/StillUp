version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: stillup-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stillup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: stillup-api
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/stillup?schema=public
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-sovereign-default-secret-change-me}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-stillup-encryption-sentinel-key-32chars}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: stillup-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
