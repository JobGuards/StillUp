version: "3.8"

services:
  db:
    image: postgres:15
    container_name: stillup-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stillup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: stillup-api
    ports:
      - "4040:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/stillup?schema=public
      PORT: 4000
      JWT_SECRET: super-secret-production-key
      MASTER_ENCRYPTION_KEY: stillup-encryption-sentinel-key-32chars
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    restart: always

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4040
    container_name: stillup-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4040
    depends_on:
      - api
    restart: always

volumes:
  postgres_data: